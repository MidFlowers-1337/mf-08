<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书出版供应链管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📚 图书出版供应链管理系统</h1>
            <div class="header-info">
                <span id="current-time"></span>
            </div>
        </header>

        <nav class="nav">
            <button class="nav-btn active" data-view="dashboard">📊 工作台</button>
            <button class="nav-btn" data-view="alerts">⚠️ 预警管理</button>
            <button class="nav-btn" data-view="books">📖 图书管理</button>
            <button class="nav-btn" data-view="inventory">📦 库存管理</button>
            <button class="nav-btn" data-view="customers">👥 客户管理</button>
            <button class="nav-btn" data-view="orders">📋 订单管理</button>
            <button class="nav-btn" data-view="returns">↩️ 退货管理</button>
            <button class="nav-btn" data-view="reconciliation">📑 对账报表</button>
            <button class="nav-btn" data-view="transactions">📜 库存流水</button>
        </nav>

        <main class="main">
            <div id="view-dashboard" class="view active"></div>
            <div id="view-alerts" class="view"></div>
            <div id="view-books" class="view"></div>
            <div id="view-inventory" class="view"></div>
            <div id="view-customers" class="view"></div>
            <div id="view-orders" class="view"></div>
            <div id="view-returns" class="view"></div>
            <div id="view-reconciliation" class="view"></div>
            <div id="view-transactions" class="view"></div>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm">确定</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
